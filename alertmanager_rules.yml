groups:
  - name: url-shortener
    rules:
      - alert: ServiceDown
        expr: up{job="url-shortener"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "URL Shortener instance is down"
          description: "{{ $labels.instance }} has been down for more than 1 minute."

      - alert: HighErrorRate
        expr: |
          rate(flask_http_request_total{status=~"5.."}[2m])
          /
          rate(flask_http_request_total[2m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP error rate"
          description: "Error rate is {{ $value | humanizePercentage }} over the last 2 minutes."

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            rate(flask_http_request_duration_seconds_bucket[5m])
          ) > 3
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High p95 response latency"
          description: "p95 latency is {{ $value }}s (threshold: 3s)."
