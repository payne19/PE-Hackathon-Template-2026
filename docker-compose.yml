services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: hackathon_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: always
    environment:
      DATABASE_URL: "postgres://postgres:postgres@db:5432/hackathon_db"
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "25"
      MIN_POOL_SIZE: "5"
      RESERVE_POOL_SIZE: "10"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  app1:
    build: .
    init: true
    restart: always
    env_file: .env
    environment:
      DATABASE_HOST: pgbouncer
      DATABASE_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "5000"

  app2:
    build: .
    init: true
    restart: always
    env_file: .env
    environment:
      DATABASE_HOST: pgbouncer
      DATABASE_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "5000"

  app3:
    build: .
    init: true
    restart: always
    env_file: .env
    environment:
      DATABASE_HOST: pgbouncer
      DATABASE_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "5000"

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3

volumes:
  pgdata:
