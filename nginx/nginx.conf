worker_processes auto;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=health_cache:1m max_size=10m inactive=10s;

    upstream app_servers {
        least_conn;
        server app1:5000;
        server app2:5000;
        server app3:5000;
        keepalive 64;
    }

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream=$upstream_addr rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile          on;
    tcp_nopush        on;
    tcp_nodelay       on;
    keepalive_timeout      65;
    keepalive_requests   1000;
    client_max_body_size   1m;

    gzip              on;
    gzip_comp_level   4;
    gzip_min_length   1000;
    gzip_types        application/json text/plain text/html;
    gzip_vary         on;

    server {
        listen 80;

        location / {
            proxy_pass             http://app_servers;
            proxy_http_version     1.1;
            proxy_set_header       Connection        "";
            proxy_set_header       Host              $host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_connect_timeout  10s;
            proxy_read_timeout     60s;
            proxy_send_timeout     60s;
        }

        location /health {
            proxy_pass         http://app_servers;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_cache        health_cache;
            proxy_cache_valid  200 1s;
            access_log off;
        }
    }
}
